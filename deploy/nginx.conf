upstream backend { server backend:8000; }

server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # ── SSE endpoints — sin buffering ───────────────────────────────
    location = /chat/stream {
        proxy_pass http://backend;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_set_header   Connection '';
        chunked_transfer_encoding on;
    }
    location = /dashboard/alerts {
        proxy_pass http://backend;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_set_header   Connection '';
        chunked_transfer_encoding on;
    }
    location = /system/events {
        proxy_pass http://backend;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_set_header   Connection '';
        chunked_transfer_encoding on;
    }

    # ── Backend API ──────────────────────────────────────────────────
    location /auth/twitch  { proxy_pass http://backend; }
    location /stream       { proxy_pass http://backend; }
    location /chat/        { proxy_pass http://backend; }
    location /dashboard    { proxy_pass http://backend; }
    location /viewers/     { proxy_pass http://backend; }
    location /moderation/  { proxy_pass http://backend; }
    location /ping         { proxy_pass http://backend; }
    location /timers/      { proxy_pass http://backend; }
    location /ai/          { proxy_pass http://backend; }
    location /system/      { proxy_pass http://backend; }

    # ── Frontend SPA — todos los demás paths ────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
